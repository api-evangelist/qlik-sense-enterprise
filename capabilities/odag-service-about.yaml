naftiko: 1.0.0-alpha2
info:
  label: Qlik Sense Enterprise Qlik Sense ODAG Service API — About
  description: 'Qlik Sense Enterprise Qlik Sense ODAG Service API — About. 1 operations. Lead operation: Qlik Sense Enterprise
    Get ODAG service information. Self-contained Naftiko capability covering one Qlik Sense Enterprise business surface.'
  tags:
  - Qlik Sense Enterprise
  - About
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QLIK_SENSE_ENTERPRISE_API_KEY: QLIK_SENSE_ENTERPRISE_API_KEY
capability:
  consumes:
  - type: http
    namespace: odag-service-about
    baseUri: https://{server}/api/odag/v1
    description: Qlik Sense Enterprise Qlik Sense ODAG Service API — About business capability. Self-contained, no shared
      references.
    resources:
    - name: about
      path: /about
      operations:
      - name: getodagabout
        method: GET
        description: Qlik Sense Enterprise Get ODAG service information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Qlik-Xrfkey
      value: '{{env.QLIK_SENSE_ENTERPRISE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: odag-service-about-rest
    port: 8080
    description: REST adapter for Qlik Sense Enterprise Qlik Sense ODAG Service API — About. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/about
      name: about
      description: REST surface for about.
      operations:
      - method: GET
        name: getodagabout
        description: Qlik Sense Enterprise Get ODAG service information
        call: odag-service-about.getodagabout
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: odag-service-about-mcp
    port: 9090
    transport: http
    description: MCP adapter for Qlik Sense Enterprise Qlik Sense ODAG Service API — About. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: qlik-sense-enterprise-get-odag
      description: Qlik Sense Enterprise Get ODAG service information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: odag-service-about.getodagabout
      outputParameters:
      - type: object
        mapping: $.
