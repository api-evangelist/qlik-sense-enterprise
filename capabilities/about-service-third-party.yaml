naftiko: 1.0.0-alpha2
info:
  label: Qlik Sense Enterprise Qlik Sense About Service API — Third Party
  description: 'Qlik Sense Enterprise Qlik Sense About Service API — Third Party. 1 operations. Lead operation: Qlik Sense
    Enterprise Get third-party software information. Self-contained Naftiko capability covering one Qlik Sense Enterprise
    business surface.'
  tags:
  - Qlik Sense Enterprise
  - Third Party
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QLIK_SENSE_ENTERPRISE_API_KEY: QLIK_SENSE_ENTERPRISE_API_KEY
capability:
  consumes:
  - type: http
    namespace: about-service-third-party
    baseUri: https://{server}/api/about/v1
    description: Qlik Sense Enterprise Qlik Sense About Service API — Third Party business capability. Self-contained, no
      shared references.
    resources:
    - name: thirdparty
      path: /thirdparty
      operations:
      - name: getthirdpartyinfo
        method: GET
        description: Qlik Sense Enterprise Get third-party software information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Qlik-Xrfkey
      value: '{{env.QLIK_SENSE_ENTERPRISE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: about-service-third-party-rest
    port: 8080
    description: REST adapter for Qlik Sense Enterprise Qlik Sense About Service API — Third Party. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/thirdparty
      name: thirdparty
      description: REST surface for thirdparty.
      operations:
      - method: GET
        name: getthirdpartyinfo
        description: Qlik Sense Enterprise Get third-party software information
        call: about-service-third-party.getthirdpartyinfo
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: about-service-third-party-mcp
    port: 9090
    transport: http
    description: MCP adapter for Qlik Sense Enterprise Qlik Sense About Service API — Third Party. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: qlik-sense-enterprise-get-third
      description: Qlik Sense Enterprise Get third-party software information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: about-service-third-party.getthirdpartyinfo
      outputParameters:
      - type: object
        mapping: $.
