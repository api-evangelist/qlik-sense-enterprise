naftiko: 1.0.0-alpha2
info:
  label: Qlik Sense Enterprise Qlik Sense Repository Service API — About
  description: 'Qlik Sense Enterprise Qlik Sense Repository Service API — About. 5 operations. Lead operation: Qlik Sense
    Enterprise Get QRS API information. Self-contained Naftiko capability covering one Qlik Sense Enterprise business surface.'
  tags:
  - Qlik Sense Enterprise
  - About
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QLIK_SENSE_ENTERPRISE_API_KEY: QLIK_SENSE_ENTERPRISE_API_KEY
capability:
  consumes:
  - type: http
    namespace: repository-service-about
    baseUri: https://{server}:4242/qrs
    description: Qlik Sense Enterprise Qlik Sense Repository Service API — About business capability. Self-contained, no shared
      references.
    resources:
    - name: about
      path: /about
      operations:
      - name: getabout
        method: GET
        description: Qlik Sense Enterprise Get QRS API information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: about-api-default
      path: /about/api/default
      operations:
      - name: getapidefaults
        method: GET
        description: Qlik Sense Enterprise Get default values for all entity types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: listentries
          in: query
          type: boolean
          description: Whether to include list entries in the defaults
    - name: about-api-description
      path: /about/api/description
      operations:
      - name: getapidescription
        method: GET
        description: Qlik Sense Enterprise Get API endpoint descriptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: extended
          in: query
          type: boolean
          description: Whether to return extended descriptions
        - name: method
          in: query
          type: string
          description: Filter endpoints by HTTP method
        - name: format
          in: query
          type: string
          description: Response format
    - name: about-api-enums
      path: /about/api/enums
      operations:
      - name: getapienums
        method: GET
        description: Qlik Sense Enterprise Get enumeration types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cache
      path: /cache
      operations:
      - name: invalidatecache
        method: DELETE
        description: Qlik Sense Enterprise Invalidate cache
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Qlik-Xrfkey
      value: '{{env.QLIK_SENSE_ENTERPRISE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: repository-service-about-rest
    port: 8080
    description: REST adapter for Qlik Sense Enterprise Qlik Sense Repository Service API — About. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/about
      name: about
      description: REST surface for about.
      operations:
      - method: GET
        name: getabout
        description: Qlik Sense Enterprise Get QRS API information
        call: repository-service-about.getabout
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/about/api/default
      name: about-api-default
      description: REST surface for about-api-default.
      operations:
      - method: GET
        name: getapidefaults
        description: Qlik Sense Enterprise Get default values for all entity types
        call: repository-service-about.getapidefaults
        with:
          listentries: rest.listentries
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/about/api/description
      name: about-api-description
      description: REST surface for about-api-description.
      operations:
      - method: GET
        name: getapidescription
        description: Qlik Sense Enterprise Get API endpoint descriptions
        call: repository-service-about.getapidescription
        with:
          extended: rest.extended
          method: rest.method
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/about/api/enums
      name: about-api-enums
      description: REST surface for about-api-enums.
      operations:
      - method: GET
        name: getapienums
        description: Qlik Sense Enterprise Get enumeration types
        call: repository-service-about.getapienums
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cache
      name: cache
      description: REST surface for cache.
      operations:
      - method: DELETE
        name: invalidatecache
        description: Qlik Sense Enterprise Invalidate cache
        call: repository-service-about.invalidatecache
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repository-service-about-mcp
    port: 9090
    transport: http
    description: MCP adapter for Qlik Sense Enterprise Qlik Sense Repository Service API — About. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: qlik-sense-enterprise-get-qrs
      description: Qlik Sense Enterprise Get QRS API information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repository-service-about.getabout
      outputParameters:
      - type: object
        mapping: $.
    - name: qlik-sense-enterprise-get-default
      description: Qlik Sense Enterprise Get default values for all entity types
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repository-service-about.getapidefaults
      with:
        listentries: tools.listentries
      outputParameters:
      - type: object
        mapping: $.
    - name: qlik-sense-enterprise-get-api
      description: Qlik Sense Enterprise Get API endpoint descriptions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repository-service-about.getapidescription
      with:
        extended: tools.extended
        method: tools.method
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
    - name: qlik-sense-enterprise-get-enumeration
      description: Qlik Sense Enterprise Get enumeration types
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repository-service-about.getapienums
      outputParameters:
      - type: object
        mapping: $.
    - name: qlik-sense-enterprise-invalidate-cache
      description: Qlik Sense Enterprise Invalidate cache
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: repository-service-about.invalidatecache
      outputParameters:
      - type: object
        mapping: $.
