naftiko: 1.0.0-alpha2
info:
  label: Qlik Sense Enterprise Qlik Sense Repository Service API — App
  description: 'Qlik Sense Enterprise Qlik Sense Repository Service API — App. 15 operations. Lead operation: Qlik Sense Enterprise
    List applications. Self-contained Naftiko capability covering one Qlik Sense Enterprise business surface.'
  tags:
  - Qlik Sense Enterprise
  - App
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QLIK_SENSE_ENTERPRISE_API_KEY: QLIK_SENSE_ENTERPRISE_API_KEY
capability:
  consumes:
  - type: http
    namespace: repository-service-app
    baseUri: https://{server}:4242/qrs
    description: Qlik Sense Enterprise Qlik Sense Repository Service API — App business capability. Self-contained, no shared
      references.
    resources:
    - name: app
      path: /app
      operations:
      - name: getapps
        method: GET
        description: Qlik Sense Enterprise List applications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: app-count
      path: /app/count
      operations:
      - name: getappscount
        method: GET
        description: Qlik Sense Enterprise Count applications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: app-full
      path: /app/full
      operations:
      - name: getappsfull
        method: GET
        description: Qlik Sense Enterprise List applications with full details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: app-hublist
      path: /app/hublist
      operations:
      - name: getapphublist
        method: GET
        description: Qlik Sense Enterprise Get hub app list
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: app-import
      path: /app/import
      operations:
      - name: importapp
        method: POST
        description: Qlik Sense Enterprise Import application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Name for the imported application
          required: true
        - name: keepdata
          in: query
          type: boolean
          description: Whether to keep the data in the imported app
        - name: excludeconnections
          in: query
          type: boolean
          description: Whether to exclude data connections from the imported app
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: app-upload
      path: /app/upload
      operations:
      - name: uploadapp
        method: POST
        description: Qlik Sense Enterprise Upload application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Name for the uploaded application
          required: true
        - name: keepdata
          in: query
          type: boolean
          description: Whether to keep the data in the uploaded app
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: app-id
      path: /app/{id}
      operations:
      - name: getapp
        method: GET
        description: Qlik Sense Enterprise Get application by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateapp
        method: PUT
        description: Qlik Sense Enterprise Update application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteapp
        method: DELETE
        description: Qlik Sense Enterprise Delete application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: app-id-copy
      path: /app/{id}/copy
      operations:
      - name: copyapp
        method: POST
        description: Qlik Sense Enterprise Copy application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Name for the copied application
        - name: includecustomproperties
          in: query
          type: boolean
          description: Whether to include custom properties in the copy
    - name: app-id-export
      path: /app/{id}/export
      operations:
      - name: exportapp
        method: GET
        description: Qlik Sense Enterprise Export application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: skipdata
          in: query
          type: boolean
          description: Whether to exclude data from the exported file
    - name: app-id-migrate
      path: /app/{id}/migrate
      operations:
      - name: migrateapp
        method: PUT
        description: Qlik Sense Enterprise Migrate application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: app-id-publish
      path: /app/{id}/publish
      operations:
      - name: publishapp
        method: PUT
        description: Qlik Sense Enterprise Publish application to a stream
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: stream
          in: query
          type: string
          description: ID of the stream to publish the application to
          required: true
        - name: name
          in: query
          type: string
          description: Optional new name for the published application
    - name: app-id-reload
      path: /app/{id}/reload
      operations:
      - name: reloadapp
        method: POST
        description: Qlik Sense Enterprise Reload application data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: app-id-replace
      path: /app/{id}/replace
      operations:
      - name: replaceapp
        method: PUT
        description: Qlik Sense Enterprise Replace application content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: app
          in: query
          type: string
          description: ID of the source application whose content replaces the target
          required: true
    authentication:
      type: apikey
      key: X-Qlik-Xrfkey
      value: '{{env.QLIK_SENSE_ENTERPRISE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: repository-service-app-rest
    port: 8080
    description: REST adapter for Qlik Sense Enterprise Qlik Sense Repository Service API — App. One Spectral-compliant resource
