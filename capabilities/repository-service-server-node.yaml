naftiko: 1.0.0-alpha2
info:
  label: Qlik Sense Enterprise Qlik Sense Repository Service API — Server Node
  description: 'Qlik Sense Enterprise Qlik Sense Repository Service API — Server Node. 3 operations. Lead operation: Qlik
    Sense Enterprise List server node configurations. Self-contained Naftiko capability covering one Qlik Sense Enterprise
    business surface.'
  tags:
  - Qlik Sense Enterprise
  - Server Node
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QLIK_SENSE_ENTERPRISE_API_KEY: QLIK_SENSE_ENTERPRISE_API_KEY
capability:
  consumes:
  - type: http
    namespace: repository-service-server-node
    baseUri: https://{server}:4242/qrs
    description: Qlik Sense Enterprise Qlik Sense Repository Service API — Server Node business capability. Self-contained,
      no shared references.
    resources:
    - name: servernodeconfiguration
      path: /servernodeconfiguration
      operations:
      - name: getservernodeconfigurations
        method: GET
        description: Qlik Sense Enterprise List server node configurations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: servernodeconfiguration-local
      path: /servernodeconfiguration/local
      operations:
      - name: getlocalservernodeconfiguration
        method: GET
        description: Qlik Sense Enterprise Get local server node configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: servernodeconfiguration-id
      path: /servernodeconfiguration/{id}
      operations:
      - name: getservernodeconfiguration
        method: GET
        description: Qlik Sense Enterprise Get server node configuration by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Qlik-Xrfkey
      value: '{{env.QLIK_SENSE_ENTERPRISE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: repository-service-server-node-rest
    port: 8080
    description: REST adapter for Qlik Sense Enterprise Qlik Sense Repository Service API — Server Node. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/servernodeconfiguration
      name: servernodeconfiguration
      description: REST surface for servernodeconfiguration.
      operations:
      - method: GET
        name: getservernodeconfigurations
        description: Qlik Sense Enterprise List server node configurations
        call: repository-service-server-node.getservernodeconfigurations
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/servernodeconfiguration/local
      name: servernodeconfiguration-local
      description: REST surface for servernodeconfiguration-local.
      operations:
      - method: GET
        name: getlocalservernodeconfiguration
        description: Qlik Sense Enterprise Get local server node configuration
        call: repository-service-server-node.getlocalservernodeconfiguration
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/servernodeconfiguration/{id}
      name: servernodeconfiguration-id
      description: REST surface for servernodeconfiguration-id.
      operations:
      - method: GET
        name: getservernodeconfiguration
        description: Qlik Sense Enterprise Get server node configuration by ID
        call: repository-service-server-node.getservernodeconfiguration
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repository-service-server-node-mcp
    port: 9090
    transport: http
    description: MCP adapter for Qlik Sense Enterprise Qlik Sense Repository Service API — Server Node. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: qlik-sense-enterprise-list-server
      description: Qlik Sense Enterprise List server node configurations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repository-service-server-node.getservernodeconfigurations
      outputParameters:
      - type: object
        mapping: $.
    - name: qlik-sense-enterprise-get-local
      description: Qlik Sense Enterprise Get local server node configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repository-service-server-node.getlocalservernodeconfiguration
      outputParameters:
      - type: object
        mapping: $.
    - name: qlik-sense-enterprise-get-server
      description: Qlik Sense Enterprise Get server node configuration by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repository-service-server-node.getservernodeconfiguration
      outputParameters:
      - type: object
        mapping: $.
