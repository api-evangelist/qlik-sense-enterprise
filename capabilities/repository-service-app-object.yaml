naftiko: 1.0.0-alpha2
info:
  label: Qlik Sense Enterprise Qlik Sense Repository Service API — App Object
  description: 'Qlik Sense Enterprise Qlik Sense Repository Service API — App Object. 2 operations. Lead operation: Qlik Sense
    Enterprise Publish application object. Self-contained Naftiko capability covering one Qlik Sense Enterprise business surface.'
  tags:
  - Qlik Sense Enterprise
  - App Object
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QLIK_SENSE_ENTERPRISE_API_KEY: QLIK_SENSE_ENTERPRISE_API_KEY
capability:
  consumes:
  - type: http
    namespace: repository-service-app-object
    baseUri: https://{server}:4242/qrs
    description: Qlik Sense Enterprise Qlik Sense Repository Service API — App Object business capability. Self-contained,
      no shared references.
    resources:
    - name: appobject-id-publish
      path: /appobject/{id}/publish
      operations:
      - name: publishappobject
        method: PUT
        description: Qlik Sense Enterprise Publish application object
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: appobject-id-unpublish
      path: /appobject/{id}/unpublish
      operations:
      - name: unpublishappobject
        method: PUT
        description: Qlik Sense Enterprise Unpublish application object
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Qlik-Xrfkey
      value: '{{env.QLIK_SENSE_ENTERPRISE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: repository-service-app-object-rest
    port: 8080
    description: REST adapter for Qlik Sense Enterprise Qlik Sense Repository Service API — App Object. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/appobject/{id}/publish
      name: appobject-id-publish
      description: REST surface for appobject-id-publish.
      operations:
      - method: PUT
        name: publishappobject
        description: Qlik Sense Enterprise Publish application object
        call: repository-service-app-object.publishappobject
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/appobject/{id}/unpublish
      name: appobject-id-unpublish
      description: REST surface for appobject-id-unpublish.
      operations:
      - method: PUT
        name: unpublishappobject
        description: Qlik Sense Enterprise Unpublish application object
        call: repository-service-app-object.unpublishappobject
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repository-service-app-object-mcp
    port: 9090
    transport: http
    description: MCP adapter for Qlik Sense Enterprise Qlik Sense Repository Service API — App Object. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: qlik-sense-enterprise-publish-application
      description: Qlik Sense Enterprise Publish application object
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repository-service-app-object.publishappobject
      outputParameters:
      - type: object
        mapping: $.
    - name: qlik-sense-enterprise-unpublish-application
      description: Qlik Sense Enterprise Unpublish application object
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repository-service-app-object.unpublishappobject
      outputParameters:
      - type: object
        mapping: $.
