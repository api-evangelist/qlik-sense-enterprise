      outputParameters:
      - type: object
        mapping: $.
    - name: qlik-sense-enterprise-update-data
      description: Qlik Sense Enterprise Update data connection
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: data-connection-data-connection.updatedataconnection
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: qlik-sense-enterprise-delete-data
