naftiko: 1.0.0-alpha2
info:
  label: Qlik Sense Enterprise Qlik Sense Proxy Service API — Session
  description: 'Qlik Sense Enterprise Qlik Sense Proxy Service API — Session. 3 operations. Lead operation: Qlik Sense Enterprise
    List all sessions. Self-contained Naftiko capability covering one Qlik Sense Enterprise business surface.'
  tags:
  - Qlik Sense Enterprise
  - Session
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QLIK_SENSE_ENTERPRISE_API_KEY: QLIK_SENSE_ENTERPRISE_API_KEY
capability:
  consumes:
  - type: http
    namespace: proxy-service-session
    baseUri: https://{server}:4243/qps
    description: Qlik Sense Enterprise Qlik Sense Proxy Service API — Session business capability. Self-contained, no shared
      references.
    resources:
    - name: session
      path: /session
      operations:
      - name: getsessions
        method: GET
        description: Qlik Sense Enterprise List all sessions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: session-id
      path: /session/{id}
      operations:
      - name: getsession
        method: GET
        description: Qlik Sense Enterprise Get session by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique session identifier
          required: true
      - name: deletesession
        method: DELETE
        description: Qlik Sense Enterprise Delete session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique session identifier to delete
          required: true
    authentication:
      type: apikey
      key: X-Qlik-Xrfkey
      value: '{{env.QLIK_SENSE_ENTERPRISE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: proxy-service-session-rest
    port: 8080
    description: REST adapter for Qlik Sense Enterprise Qlik Sense Proxy Service API — Session. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/session
      name: session
      description: REST surface for session.
      operations:
      - method: GET
        name: getsessions
        description: Qlik Sense Enterprise List all sessions
        call: proxy-service-session.getsessions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/session/{id}
      name: session-id
      description: REST surface for session-id.
      operations:
      - method: GET
        name: getsession
        description: Qlik Sense Enterprise Get session by ID
        call: proxy-service-session.getsession
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesession
        description: Qlik Sense Enterprise Delete session
        call: proxy-service-session.deletesession
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: proxy-service-session-mcp
    port: 9090
    transport: http
    description: MCP adapter for Qlik Sense Enterprise Qlik Sense Proxy Service API — Session. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: qlik-sense-enterprise-list-all
      description: Qlik Sense Enterprise List all sessions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: proxy-service-session.getsessions
      outputParameters:
      - type: object
        mapping: $.
    - name: qlik-sense-enterprise-get-session
      description: Qlik Sense Enterprise Get session by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: proxy-service-session.getsession
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: qlik-sense-enterprise-delete-session
      description: Qlik Sense Enterprise Delete session
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: proxy-service-session.deletesession
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
