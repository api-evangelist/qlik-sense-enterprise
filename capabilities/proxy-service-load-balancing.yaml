naftiko: 1.0.0-alpha2
info:
  label: Qlik Sense Enterprise Qlik Sense Proxy Service API — Load Balancing
  description: 'Qlik Sense Enterprise Qlik Sense Proxy Service API — Load Balancing. 1 operations. Lead operation: Qlik Sense
    Enterprise Prioritize engine services for load balancing. Self-contained Naftiko capability covering one Qlik Sense Enterprise
    business surface.'
  tags:
  - Qlik Sense Enterprise
  - Load Balancing
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QLIK_SENSE_ENTERPRISE_API_KEY: QLIK_SENSE_ENTERPRISE_API_KEY
capability:
  consumes:
  - type: http
    namespace: proxy-service-load-balancing
    baseUri: https://{server}:4243/qps
    description: Qlik Sense Enterprise Qlik Sense Proxy Service API — Load Balancing business capability. Self-contained,
      no shared references.
    resources:
    - name: loadbalancing-prioritize
      path: /loadbalancing/prioritize
      operations:
      - name: prioritizeloadbalancing
        method: POST
        description: Qlik Sense Enterprise Prioritize engine services for load balancing
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Qlik-Xrfkey
      value: '{{env.QLIK_SENSE_ENTERPRISE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: proxy-service-load-balancing-rest
    port: 8080
    description: REST adapter for Qlik Sense Enterprise Qlik Sense Proxy Service API — Load Balancing. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/loadbalancing/prioritize
      name: loadbalancing-prioritize
      description: REST surface for loadbalancing-prioritize.
      operations:
      - method: POST
        name: prioritizeloadbalancing
        description: Qlik Sense Enterprise Prioritize engine services for load balancing
        call: proxy-service-load-balancing.prioritizeloadbalancing
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: proxy-service-load-balancing-mcp
    port: 9090
    transport: http
    description: MCP adapter for Qlik Sense Enterprise Qlik Sense Proxy Service API — Load Balancing. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: qlik-sense-enterprise-prioritize-engine
      description: Qlik Sense Enterprise Prioritize engine services for load balancing
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: proxy-service-load-balancing.prioritizeloadbalancing
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
