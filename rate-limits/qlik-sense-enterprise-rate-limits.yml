specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Qlik Sense Enterprise
providerId: qlik-sense-enterprise
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Analytics
  - Business Intelligence
  - Enterprise
  - Rate Limiting
notes: Qlik Sense Enterprise APIs run inside the customer's on-premises Qlik deployment; throughput
  is bounded by the deployed engine and proxy capacity rather than a vendor-published per-second limit.
  Qlik does not document a public RPS or RPM ceiling for these APIs.
description: The Qlik Sense Enterprise Repository, Engine JSON, Proxy, and Capabilities APIs are deployed
  on customer-managed infrastructure; effective throughput depends on the customer's hardware, license
  capacity, and proxy configuration. Qlik does not publish vendor-side numeric rate-limit values for
  these APIs.
sources:
  - https://www.qlik.com/us/pricing
limits:
  - name: Per-Deployment Throughput
    scope: deployment
    metric: varies
    limit: bounded by customer-managed Qlik Sense Enterprise infrastructure
    notes: No vendor-published RPS/RPM; throughput is set by the on-premises engine and proxy capacity.
policies:
  - name: Capacity Planning
    description: Effective rate is governed by the deployed Qlik Sense engine and proxy capacity; consult
      Qlik sizing guidance and the Qlik Sense Help portal for tuning.
