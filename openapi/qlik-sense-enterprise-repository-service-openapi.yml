  /userdirectory/{id}:
    get:
      operationId: getUserDirectory
      summary: Get user directory by ID
      description: >-
        Retrieves a single user directory connector by its unique identifier.
      tags:
        - User Directory
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: User directory returned successfully
          content:
