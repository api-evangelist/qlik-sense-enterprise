  /cache:
    delete:
      operationId: invalidateCache
      summary: Invalidate cache
      description: >-
        Invalidates the QRS cache, forcing fresh data retrieval on subsequent
        requests. Use with caution as this impacts performance.
      tags:
        - About
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
      responses:
        '204':
          description: Cache invalidated successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    xrfkey:
      type: apiKey
      in: header
      name: X-Qlik-Xrfkey
      description: >-
        Cross-site request forgery prevention key. Must be 16 arbitrary
        characters and must match the Xrfkey query parameter.
    certificate:
      type: mutualTLS
      description: >-
        Client certificate authentication using certificates exported from
        Qlik Sense. Used when connecting directly to QRS on port 4242.
    windowsAuth:
      type: http
      scheme: negotiate
      description: >-
        Windows Integrated Authentication (NTLM/Kerberos) used when
        connecting via the Qlik Sense Proxy Service.
  parameters:
    XrfKeyParam:
      name: Xrfkey
      in: query
      required: true
      description: >-
        Cross-site request forgery prevention key. Must be 16 arbitrary
        characters matching the X-Qlik-Xrfkey header value.
      schema:
        type: string
        minLength: 16
        maxLength: 16
    IdParam:
      name: id
      in: path
      required: true
      description: Unique identifier (GUID) of the entity
      schema:
        type: string
        format: uuid
    FilterParam:
      name: filter
      in: query
      required: false
      description: >-
        Filter expression using the syntax: property operator value. Supports
        operators like eq, ne, so, ew, sw. Example: name eq 'MyApp'
      schema:
        type: string
    OrderByParam:
      name: orderby
      in: query
      required: false
      description: >-
        Property name to order results by, optionally followed by asc or desc.
      schema:
        type: string
    PrivilegesParam:
      name: privileges
      in: query
      required: false
      description: >-
        Whether to append privilege information to the returned entities.
      schema:
        type: boolean
        default: false
  responses:
    BadRequest:
      description: Invalid request. The request body or parameters are malformed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: >-
        Authentication failed. The request lacks valid authentication
        credentials or the Xrfkey header/parameter is missing or mismatched.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested entity was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: >-
        Update conflict. The entity has been modified since it was last
        retrieved. Fetch the latest version and retry.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
          description: Human-readable error message
    EntityCount:
      type: object
      properties:
        value:
          type: integer
          description: Number of entities matching the filter
    AboutInfo:
      type: object
      properties:
        buildVersion:
          type: string
          description: QRS API build version
        buildDate:
          type: string
          description: QRS API build date
        databaseProvider:
          type: string
          description: Database provider used by the repository
        nodeType:
          type: integer
          description: Type of the node (0=Central, 1=Non-central)
        sharedPersistence:
          type: boolean
          description: Whether shared persistence is configured
        requiresBootstrap:
          type: boolean
          description: Whether the node requires bootstrapping
    EndpointDescription:
      type: object
      properties:
        method:
          type: string
          description: HTTP method
        path:
          type: string
          description: Endpoint path
        description:
          type: string
          description: Endpoint description
        parameters:
          type: array
          items:
            type: object
    App:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        createdDate:
          type: string
          format: date-time
          description: Date the app was created
        modifiedDate:
          type: string
          format: date-time
          description: Date the app was last modified
        modifiedByUserName:
          type: string
          description: Username of the last modifier
        name:
          type: string
          description: Application name
        appId:
          type: string
          description: Internal application identifier
        description:
          type: string
          description: Application description
        publishTime:
          type: string
          format: date-time
          description: Date the app was published
        published:
          type: boolean
          description: Whether the app is published
        stream:
          $ref: '#/components/schemas/StreamCondensed'
        fileSize:
          type: integer
          format: int64
          description: Size of the application file in bytes
        lastReloadTime:
          type: string
          format: date-time
          description: Date of the last successful reload
        thumbnail:
          type: string
          description: Path to the app thumbnail
        savedInProductVersion:
          type: string
          description: Product version the app was last saved in
        migrationHash:
          type: string
          description: Hash indicating the migration state
        availabilityStatus:
          type: integer
          description: Availability status (0=Normal, 1=Archived)
        owner:
          $ref: '#/components/schemas/UserCondensed'
