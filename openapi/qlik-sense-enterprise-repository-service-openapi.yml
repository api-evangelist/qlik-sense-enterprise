        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /userdirectory/syncuserdirectories:
    post:
      operationId: syncUserDirectories
      summary: Synchronize user directories
      description: >-
        Triggers a synchronization of all or specified user directories,
        importing updated user and group information.
      tags:
        - User Directory
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
      requestBody:
        required: true
        content:
