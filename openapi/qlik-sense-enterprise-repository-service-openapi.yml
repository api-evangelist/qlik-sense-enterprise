openapi: 3.1.0
info:
  title: Qlik Sense Repository Service API
  description: >-
    Core REST API for managing Qlik Sense Enterprise resources including apps,
    streams, users, security rules, and all configuration available through the
    Qlik Management Console (QMC). The QRS API provides CRUD operations for all
    entity types in the Qlik Sense repository, enabling programmatic
    administration of a Qlik Sense Enterprise deployment.
  version: 2025.11.0
  contact:
    name: Qlik Support
    url: https://community.qlik.com/
  license:
    name: Proprietary
    url: https://www.qlik.com/us/legal/terms-of-use
  x-providerName: Qlik
  x-serviceName: qlik-sense-repository-service
servers:
  - url: https://{server}:4242/qrs
    description: Direct QRS connection via certificate authentication
    variables:
      server:
        default: localhost
        description: Qlik Sense server hostname
  - url: https://{server}/qrs
    description: QRS connection via Qlik Sense Proxy Service (QPS)
    variables:
      server:
        default: localhost
        description: Qlik Sense server hostname
security:
  - xrfkey: []
  - certificate: []
  - windowsAuth: []
tags:
  - name: About
    description: Retrieve API metadata, version, and schema information
  - name: App
    description: Manage Qlik Sense applications including import, export, copy, publish, and reload
  - name: App Object
    description: Manage application objects such as sheets, stories, and bookmarks
  - name: Content Library
    description: Manage shared and app-specific content libraries
  - name: Custom Property
    description: Manage custom properties for tagging and categorizing entities
  - name: Data Connection
    description: Manage data connections and data sources
  - name: Extension
    description: Manage visualization extensions
  - name: License
    description: Manage licenses, access types, and license allocations
  - name: Notification
    description: Subscribe to and manage change notifications
  - name: Reload Task
    description: Manage and execute reload tasks
  - name: Security Rule
    description: Manage security rules and access control
  - name: Server Node
    description: Manage server nodes in a multi-node deployment
  - name: Stream
    description: Manage streams for organizing and distributing apps
  - name: Tag
    description: Manage tags for categorizing entities
  - name: Task
    description: Start and stop tasks including reload and external program tasks
  - name: User
    description: Manage users and user directory synchronization
  - name: User Directory
    description: Manage user directory connectors and synchronization settings
  - name: Virtual Proxy
    description: Manage virtual proxy configurations
paths:
  /about:
    get:
      operationId: getAbout
      summary: Get QRS API information
      description: >-
        Retrieves basic information about the QRS API including the build
        version and the database identifier.
      tags:
        - About
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
      responses:
        '200':
          description: QRS API information returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AboutInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /about/api/description:
    get:
      operationId: getApiDescription
      summary: Get API endpoint descriptions
      description: >-
        Retrieves a description of all available QRS API endpoints, optionally
        filtered by HTTP method and in an extended format.
      tags:
        - About
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - name: extended
          in: query
          description: Whether to return extended descriptions
          schema:
            type: boolean
            default: false
        - name: method
          in: query
          description: Filter endpoints by HTTP method
          schema:
            type: string
            enum:
              - GET
              - POST
              - PUT
              - DELETE
        - name: format
          in: query
          description: Response format
          schema:
            type: string
            enum:
              - JSON
      responses:
        '200':
          description: API description returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EndpointDescription'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /about/api/default:
    get:
      operationId: getApiDefaults
      summary: Get default values for all entity types
      description: >-
        Retrieves the default values for all entity types in the QRS,
        optionally including list entries.
      tags:
        - About
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - name: listentries
          in: query
          description: Whether to include list entries in the defaults
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Default entity values returned successfully
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
  /about/api/enums:
    get:
      operationId: getApiEnums
      summary: Get enumeration types
      description: >-
        Retrieves all enumeration types used across the QRS API, including
        their allowed values.
      tags:
        - About
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
      responses:
        '200':
          description: Enumeration types returned successfully
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
  /app:
    get:
      operationId: getApps
      summary: List applications
      description: >-
        Retrieves a list of Qlik Sense applications in condensed format,
        optionally filtered by a query expression.
      tags:
        - App
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/FilterParam'
        - $ref: '#/components/parameters/OrderByParam'
        - $ref: '#/components/parameters/PrivilegesParam'
      responses:
        '200':
          description: List of applications returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppCondensed'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /app/full:
    get:
      operationId: getAppsFull
      summary: List applications with full details
      description: >-
        Retrieves a list of Qlik Sense applications in full format including
        all properties, owner, stream, tags, and custom properties.
      tags:
        - App
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/FilterParam'
        - $ref: '#/components/parameters/OrderByParam'
        - $ref: '#/components/parameters/PrivilegesParam'
      responses:
        '200':
          description: Full list of applications returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/App'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /app/count:
    get:
      operationId: getAppsCount
      summary: Count applications
      description: >-
        Returns the number of applications matching an optional filter
        expression.
      tags:
        - App
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/FilterParam'
      responses:
        '200':
          description: Application count returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityCount'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /app/{id}:
    get:
      operationId: getApp
      summary: Get application by ID
      description: >-
        Retrieves a single Qlik Sense application by its unique identifier,
        returned in full format.
      tags:
        - App
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/PrivilegesParam'
      responses:
        '200':
          description: Application returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      operationId: updateApp
      summary: Update application
      description: >-
        Updates an existing Qlik Sense application. The complete entity
        including the unchanged modifiedDate must be provided in the request
        body.
      tags:
        - App
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/PrivilegesParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/App'
      responses:
        '200':
          description: Application updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      operationId: deleteApp
      summary: Delete application
      description: >-
        Permanently deletes a Qlik Sense application from the repository.
      tags:
        - App
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Application deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /app/import:
    post:
      operationId: importApp
      summary: Import application
      description: >-
        Imports a Qlik Sense application from a QVF file. The file is uploaded
        as the request body and the application name and other attributes are
        provided as query parameters.
      tags:
        - App
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - name: name
          in: query
          required: true
          description: Name for the imported application
          schema:
            type: string
        - name: keepdata
          in: query
          description: Whether to keep the data in the imported app
          schema:
            type: boolean
            default: false
        - name: excludeconnections
          in: query
          description: Whether to exclude data connections from the imported app
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/vnd.qlik.sense.app:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Application imported successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /app/{id}/copy:
    post:
      operationId: copyApp
      summary: Copy application
      description: >-
        Creates a copy of an existing Qlik Sense application. Requires Read
        and Duplicate permissions on the source application.
      tags:
        - App
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/IdParam'
        - name: name
          in: query
          description: Name for the copied application
          schema:
            type: string
        - name: includecustomproperties
          in: query
          description: Whether to include custom properties in the copy
          schema:
            type: boolean
            default: false
      responses:
        '201':
          description: Application copied successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /app/{id}/export:
    get:
      operationId: exportApp
      summary: Export application
      description: >-
        Exports a Qlik Sense application as a QVF file. Returns a download
        path that can be used to retrieve the exported file.
      tags:
        - App
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/IdParam'
        - name: skipdata
          in: query
          description: Whether to exclude data from the exported file
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Export download path returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /app/{id}/publish:
    put:
      operationId: publishApp
      summary: Publish application to a stream
      description: >-
        Publishes a Qlik Sense application to a specified stream, making it
        available to users with access to that stream.
      tags:
        - App
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/IdParam'
        - name: stream
          in: query
          required: true
          description: ID of the stream to publish the application to
          schema:
            type: string
            format: uuid
        - name: name
          in: query
          description: Optional new name for the published application
          schema:
            type: string
      responses:
        '200':
          description: Application published successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /app/{id}/reload:
    post:
      operationId: reloadApp
      summary: Reload application data
      description: >-
        Triggers a reload of the application data from its connected data
        sources.
      tags:
        - App
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Application reload triggered successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /app/{id}/replace:
    put:
      operationId: replaceApp
      summary: Replace application content
      description: >-
        Replaces the content of a published application with the content from
        another application, preserving the published app's identity and
        stream membership.
      tags:
        - App
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/IdParam'
        - name: app
          in: query
          required: true
          description: ID of the source application whose content replaces the target
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Application content replaced successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /app/{id}/migrate:
    put:
      operationId: migrateApp
      summary: Migrate application
      description: >-
        Migrates an application to the current Qlik Sense version format.
      tags:
        - App
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Application migrated successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /app/hublist:
    get:
      operationId: getAppHubList
      summary: Get hub app list
      description: >-
        Retrieves the list of applications available in the hub for the
        authenticated user, including published and personal apps.
      tags:
        - App
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
      responses:
        '200':
          description: Hub application list returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/App'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /app/upload:
    post:
      operationId: uploadApp
      summary: Upload application
      description: >-
        Uploads a Qlik Sense application from a QVF binary file to the
        repository.
      tags:
        - App
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - name: name
          in: query
          required: true
          description: Name for the uploaded application
          schema:
            type: string
        - name: keepdata
          in: query
          description: Whether to keep the data in the uploaded app
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/vnd.qlik.sense.app:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Application uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /appobject/{id}/publish:
    put:
      operationId: publishAppObject
      summary: Publish application object
      description: >-
        Publishes an application object such as a sheet or story, making it
        available to all users who can access the application.
      tags:
        - App Object
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Application object published successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /appobject/{id}/unpublish:
    put:
      operationId: unpublishAppObject
      summary: Unpublish application object
      description: >-
        Unpublishes an application object, reverting it to private status.
      tags:
        - App Object
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Application object unpublished successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /stream:
    get:
      operationId: getStreams
      summary: List streams
      description: >-
        Retrieves a list of all streams in condensed format, optionally
        filtered by a query expression.
      tags:
        - Stream
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/FilterParam'
        - $ref: '#/components/parameters/OrderByParam'
        - $ref: '#/components/parameters/PrivilegesParam'
      responses:
        '200':
          description: List of streams returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StreamCondensed'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createStream
      summary: Create stream
      description: >-
        Creates a new stream for organizing and distributing published
        applications.
      tags:
        - Stream
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Stream'
      responses:
        '201':
          description: Stream created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stream'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /stream/full:
    get:
      operationId: getStreamsFull
      summary: List streams with full details
      description: >-
        Retrieves a list of all streams in full format including owner,
        custom properties, and tags.
      tags:
        - Stream
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/FilterParam'
        - $ref: '#/components/parameters/OrderByParam'
        - $ref: '#/components/parameters/PrivilegesParam'
      responses:
        '200':
          description: Full list of streams returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Stream'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /stream/count:
    get:
      operationId: getStreamsCount
      summary: Count streams
      description: Returns the number of streams matching an optional filter expression.
      tags:
        - Stream
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/FilterParam'
      responses:
        '200':
          description: Stream count returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityCount'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /stream/{id}:
    get:
      operationId: getStream
      summary: Get stream by ID
      description: Retrieves a single stream by its unique identifier in full format.
      tags:
        - Stream
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/PrivilegesParam'
      responses:
        '200':
          description: Stream returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stream'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      operationId: updateStream
      summary: Update stream
      description: >-
        Updates an existing stream. The complete entity with unchanged
        modifiedDate must be provided.
      tags:
        - Stream
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Stream'
      responses:
        '200':
          description: Stream updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stream'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      operationId: deleteStream
      summary: Delete stream
      description: >-
        Permanently deletes a stream. Published apps in the stream are
        unpublished.
      tags:
        - Stream
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Stream deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /user:
    get:
      operationId: getUsers
      summary: List users
      description: >-
        Retrieves a list of all users in condensed format, optionally filtered
        by a query expression.
      tags:
        - User
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/FilterParam'
        - $ref: '#/components/parameters/OrderByParam'
        - $ref: '#/components/parameters/PrivilegesParam'
      responses:
        '200':
          description: List of users returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserCondensed'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /user/full:
    get:
      operationId: getUsersFull
      summary: List users with full details
      description: >-
        Retrieves a list of all users in full format including roles,
        attributes, custom properties, and tags.
      tags:
        - User
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/FilterParam'
        - $ref: '#/components/parameters/OrderByParam'
        - $ref: '#/components/parameters/PrivilegesParam'
      responses:
        '200':
          description: Full list of users returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /user/count:
    get:
      operationId: getUsersCount
      summary: Count users
      description: Returns the number of users matching an optional filter expression.
      tags:
        - User
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/FilterParam'
      responses:
        '200':
          description: User count returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityCount'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /user/{id}:
    get:
      operationId: getUser
      summary: Get user by ID
      description: Retrieves a single user by its unique identifier in full format.
      tags:
        - User
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/PrivilegesParam'
      responses:
        '200':
          description: User returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      operationId: updateUser
      summary: Update user
      description: >-
        Updates an existing user. The complete entity with unchanged
        modifiedDate must be provided.
      tags:
        - User
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
