              schema:
                $ref: '#/components/schemas/UserDirectory'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      operationId: deleteUserDirectory
      summary: Delete user directory and users
      description: >-
        Deletes a user directory connector and optionally all users imported
        from it.
      tags:
        - User Directory
      parameters:
        - $ref: '#/components/parameters/XrfKeyParam'
        - $ref: '#/components/parameters/IdParam'
      responses:
