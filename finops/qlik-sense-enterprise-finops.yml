meters:
  - name: platform_license
    description: Qlik Sense Enterprise platform license; billed per the customer's negotiated contract.
    unit: varies
    aggregation: sum
    dimensions:
      - contract
principles:
  - name: Visibility
    description: Qlik Sense Enterprise emits internal usage telemetry through the Qlik Management Console
      and the QMC logs; consumers must collect this data inside their own deployment.
  - name: Allocation
    description: Allocate platform license cost against the analytics teams and business units consuming
      Qlik dashboards; sub-allocation within the platform requires custom tagging on apps and streams.
  - name: Optimization
    description: Right-size the Qlik deployment (engine memory, proxy capacity) and consolidate streams
      and apps to keep license consumption inside the contracted capacity.
  - name: Accountability
    description: License renewal and capacity expansion are owned by the analytics platform team; engage
      Qlik sales for true-up or downgrade conversations.
