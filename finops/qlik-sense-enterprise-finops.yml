notes: Qlik Sense Enterprise is a license-based on-premises analytics platform; Qlik does not publish
  per-API meter pricing or usage telemetry on its public site. FinOps mapping is left at the platform
  license level until the customer contract terms are reconciled.
description: FOCUS-aligned FinOps for Qlik Sense Enterprise is bound to the platform license rather
  than per-API metering; usage data is collected inside the customer's Qlik deployment.
